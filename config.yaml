  - name: "Documentos_LGPD"
    type: filesystem
    path: "/home/user/Documents/LGPD/"
    recursive: true

  - name: "Documentos_RH"
    type: filesystem
    path: "/home/user/Documents/Concursos/"
    recursive: true

file_scan:
  # All compatible types (omit or set to [] to use app default full list). Recursive scan in folders.
  extensions:
    - .txt
    - .csv
    - .pdf
    - .doc
    - .docx
    - .odt
    - .ods
    - .odp
    - .xls
    - .xlsx
    - .xlsm
    - .ppt
    - .pptx
    - .sqlite
    - .sqlite3
    - .db
    - .json
    - .jsonl
    - .xml
    - .html
    - .htm
    - .md
    - .yml
    - .yaml
    - .log
    - .ini
    - .cfg
    - .conf
    - .env
    - .sql
    - .rtf
    - .eml
    - .msg
    - .tex
    - .bib
  recursive: true

report:
  output_dir: .

api:
  port: 8088

sqlite_path: audit_results.db
scan:
  max_workers: 1

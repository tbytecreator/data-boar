# ---------------------------------------------------------------------------
# Data Boar — starter config for LGPD-style evaluation (documentation sample)
# ---------------------------------------------------------------------------
# Copy to your working directory as config.yaml (or pass --config / CONFIG_PATH).
# Replace paths, hosts, and env var names to match your environment. Values are
# fictitious (RFC 5737 TEST-NET, placeholder folders) — not real infrastructure.
#
# Navigation:
#   deploy/config.example.yaml — minimal Docker-oriented file (empty targets).
#   deploy/samples/README.md — index of samples + scope CSV.
#   docs/samples/README.md — short hub from docs/ into this folder.
#   config/README.md — legacy JSON shape only (prefer YAML for new projects).
# ---------------------------------------------------------------------------

targets:
  - name: demo-documents
    type: filesystem
    path: /opt/lgpd-demo/documents
    recursive: true

  - name: demo-exports
    type: filesystem
    path: /opt/lgpd-demo/exports
    recursive: true

  - name: demo-postgres
    type: database
    driver: postgresql+psycopg2
    host: 192.0.2.10
    port: 5432
    database: demo_app
    user: demo_reader
    pass_from_env: DEMO_DB_PASSWORD

file_scan:
  extensions: [.txt, .csv, .pdf, .docx, .xlsx]
  recursive: true
  scan_sqlite_as_db: true
  # Rows / TOPN caps for DB-like sampling; see USAGE.md (database connectors).
  sample_limit: 10
  # UTF-8 characters read per plain-text file on filesystem/shares (not the same as sample_limit).
  file_sample_max_chars: 12000
  # --- Optional (commented defaults = product defaults; uncomment to opt in) ---
  # scan_compressed: false
  # # When true: opens zip/tar/gz/7z/etc. inside scanned paths. Increases I/O and CPU.
  # max_inner_size: 52428800
  # # Optional cap (bytes) on extracted inner size per archive (connector default if omitted).
  # file_passwords:
  #   default: "literal-password-for-lab-only"
  # # Per-extension passwords for protected PDF/ZIP/PPTX; literals only (see USAGE).
  # use_content_type: false
  # # Magic-byte detection for renamed files (extra I/O); see SENSITIVITY_DETECTION.md.

report:
  output_dir: ./reports

sqlite_path: ./data/audit_results.db

api:
  port: 8088
  host: "127.0.0.1"

# Parallelism across *targets* (separate connectors), not CPU threads per file.
# 1 = sequential (safest default). Raise to 2–4 when you have many independent targets
# and disk/network can keep up (I/O bound). Hard cap 32 in loader.
scan:
  max_workers: 2

timeouts:
  connect_seconds: 20
  read_seconds: 60

# Anti-abuse for the scan API / concurrent runs (see USAGE rate_limit).
rate_limit:
  enabled: true
  max_concurrent_scans: 2
  min_interval_seconds: 5

sensitivity_detection:
  ml_terms:
    - { text: "cpf", label: sensitive }
    - { text: "email", label: sensitive }
    - { text: "rg", label: sensitive }
  dl_terms:
    - { text: "prontuário", label: sensitive }
    - { text: "diagnóstico", label: sensitive }
  # --- Optional: load larger term lists from files (see COMPLIANCE_FRAMEWORKS.md) ---
  # ml_patterns_file: ./my_ml_terms.yaml
  # dl_patterns_file: ./my_dl_terms.yaml

# --- Optional: persist high-confidence learned terms for later merge into ml_patterns_file ---
# learned_patterns:
#   enabled: false
#   output_file: ./learned_patterns.yaml
#   min_sensitivity: HIGH
#   min_confidence: 70

# --- Optional: CNPJ alfanumerico (plan-specific); default remains numeric CNPJ only ---
# detection:
#   cnpj_alphanumeric: false

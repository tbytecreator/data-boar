# Optional override for local/Swarm: bind mount ./data so /data/config.yaml is available.
# Copy to docker-compose.override.yml and use:
#   docker stack deploy -c deploy/docker-compose.yml -c deploy/docker-compose.override.yml lgpd-audit
# or: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.override.yml up -d
version: "3.8"
services:
  lgpd-audit:
    volumes:
      - ./data:/data

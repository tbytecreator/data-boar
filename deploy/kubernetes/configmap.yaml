apiVersion: v1
kind: ConfigMap
metadata:
  name: lgpd-audit-config
  labels:
    app: lgpd-audit
data:
  config.yaml: |
    targets: []
    file_scan:
      extensions: [.txt, .csv, .pdf, .docx, .xlsx]
      recursive: true
      scan_sqlite_as_db: true
      sample_limit: 5
      file_sample_max_chars: 12000
    report:
      output_dir: /data
    api:
      port: 8088
    sqlite_path: /data/audit_results.db
    scan:
      max_workers: 1

# Example config for container. Copy to /data/config.yaml or mount your own.
# In container: sqlite_path and report.output_dir should be under /data so they persist.
# Add database/filesystem/API targets (see docs/USAGE.md).
targets: []

file_scan:
  extensions: [.txt, .csv, .pdf, .docx, .xlsx]
  recursive: true
  scan_sqlite_as_db: true
  sample_limit: 5

report:
  output_dir: /data

api:
  port: 8088
  # workers: 1   # 1 = minimal footprint; 2+ if you need more concurrent API traffic (I/O-bound)

sqlite_path: /data/audit_results.db
scan:
  # Parallel targets: 1 = sequential (minimal), 2–4 for many DB/FS targets (I/O-bound; network/disk are the bottleneck)
  max_workers: 1

# Optional: connection/read timeouts (seconds). Per-target overrides: connect_timeout, read_timeout, or timeout on each target (see docs/USAGE.md).
# timeouts:
#   connect_seconds: 25
#   read_seconds: 90

# Optional: ML/DL training terms for sensitivity detection (see docs/SENSITIVITY_DETECTION.md).
# Uncomment and set paths, or use inline sensitivity_detection.ml_terms / dl_terms.
# ml_patterns_file: /data/config/ml_terms.yaml
# dl_patterns_file: /data/config/dl_terms.yaml
# sensitivity_detection:
#   # Optional Plan §4: declared VARCHAR/CHAR length + ID-like column name → MEDIUM FORMAT_LENGTH_HINT_ID (default off).
#   # connector_format_id_hint: true
#   ml_terms:
#     - { text: "cpf", label: sensitive }
#     - { text: "email", label: sensitive }
#     - { text: "item_count", label: non_sensitive }
#   dl_terms:
#     - { text: "customer name", label: sensitive }
#     - { text: "internal id", label: non_sensitive }

# CI: tests and dependency audit on push/PR.
# Keeps main branch healthy and improves security via automated checks.
#
# Third-party Actions use full commit SHAs (major tag noted in comment). Refresh via Dependabot
# (github-actions) or deliberately after reading upstream release notes. astral-sh/setup-uv `version`
# pins the uv CLI release (see https://github.com/astral-sh/uv/releases), not the action repo tag.
#
# Explicit permissions limit GITHUB_TOKEN (satisfies "Workflow does not contain permissions" check).
# contents: read is the minimal scope needed for checkout and dependency install.
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Full history required for scripts/pii_history_guard.py --full-history (PII in old commits).
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v -W error
        # addopts in pyproject.toml also set -W error; explicit in CI so tests pass without warnings.

      - name: PII history guard (full git history)
        run: uv run python scripts/pii_history_guard.py --full-history

  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync

      # Single gate: same hooks as local `uv run pre-commit run --all-files` (.pre-commit-config.yaml).
      - name: Pre-commit (all files)
        run: uv run pre-commit run --all-files

  bandit:
    name: Bandit (medium+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync

      # -ll = medium and high only; [tool.bandit] in pyproject.toml (skips, exclude_dirs). See PLAN_BANDIT_SECURITY_LINTER.md.
      - name: Run Bandit
        run: >-
          uv run bandit -c pyproject.toml -r api core config connectors database file_scan report main.py -ll -q

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync

      - name: Install pip-audit
        run: uv pip install pip-audit

      - name: Run pip audit
        run: uv run pip-audit

  sonar:
    name: SonarQube / SonarCloud
    runs-on: ubuntu-latest
    if: ${{ secrets.SONAR_TOKEN != '' }}
    needs: [test]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          version: "0.11.2"

      - name: Install dependencies
        run: uv sync

      - name: SonarQube / SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SonarQube Server only: set SONAR_HOST_URL in repo secrets
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

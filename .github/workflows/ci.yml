# CI: tests and dependency audit on push/PR.
# Keeps main branch healthy and improves security via automated checks.
#
# Explicit permissions limit GITHUB_TOKEN (satisfies "Workflow does not contain permissions" check).
# contents: read is the minimal scope needed for checkout and dependency install.
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest -v -W error
        # addopts in pyproject.toml also set -W error; explicit in CI so tests pass without warnings.

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Install pip-audit
        run: uv pip install pip-audit

      - name: Run pip audit
        run: uv run pip-audit

  sonar:
    name: SonarQube / SonarCloud
    runs-on: ubuntu-latest
    if: ${{ secrets.SONAR_TOKEN != '' }}
    needs: [test]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: SonarQube / SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          # SonarQube Server only: set SONAR_HOST_URL in repo secrets
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

# Rust CI: cargo check, test, fmt, and clippy for the boar_fast_filter crate
# (rust/boar_fast_filter), the only Rust component in this repo.
#
# Triggers: every push and PR targeting main or master, scoped via path filters
# so unrelated Python-only changes do not spend a Rust runner.
#
# Path filters must stay on rust/** (this workflow file). The Python executive
# Markdown CLI is the console script data-boar-report (cli/reporter.py); that
# string is not a repo directory -- do not use it in paths: or pathspecs here.
#
# Action pins follow the existing repo convention (full commit SHA + version
# comment). The Rust toolchain itself is provided by the runner image; we
# install/refresh it deterministically with `rustup` instead of adding a new
# third-party action SHA to track.
#
# Quality bar: `cargo clippy --all-targets -- -D warnings` makes any clippy
# lint a CI failure, satisfying the "fail on lint errors" requirement.
name: Rust CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "rust/**"
      - ".github/workflows/rust-ci.yml"

defaults:
  run:
    working-directory: rust/boar_fast_filter

jobs:
  rust:
    name: cargo check / test / clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # PyO3 needs a Python interpreter visible at link time; setup-python
      # exports PYO3_PYTHON-compatible env via PATH so cargo builds find it.
      - name: Set up Python (for PyO3 link)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install Rust toolchain (stable) with clippy and rustfmt
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup component add clippy rustfmt
          rustc --version
          cargo --version
          cargo clippy --version
          cargo fmt --version

      # Caching cargo registry/target would speed up subsequent runs but
      # requires pinning actions/cache to a verified commit SHA per the repo
      # convention. The crate is small and a clean build is ~10s, so we skip
      # the cache step here and can add it in a follow-up that pins the SHA.

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets --locked

      - name: cargo test
        run: cargo test --all-targets --locked

      # `-D warnings` promotes every clippy lint to an error so the job fails
      # on any new warning introduced in the crate.
      - name: cargo clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

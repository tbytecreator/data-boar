# Manual test of Slack incoming webhook (repository secret SLACK_WEBHOOK_URL).
# Skips cleanly if the secret is unset — no failed runs on forks without the secret.
name: Slack operator ping (manual)

permissions:
  contents: read

'on':
  workflow_dispatch:
    inputs:
      message:
        description: Plain-text message to post to Slack
        required: false
        default: "Data Boar — manual Slack ping from GitHub Actions (workflow_dispatch)."

jobs:
  ping:
    runs-on: ubuntu-latest
    if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
    steps:
      - name: Post to Slack incoming webhook
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTIFY_TEXT: ${{ inputs.message }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          url = os.environ["SLACK_WEBHOOK_URL"]
          text = os.environ.get("NOTIFY_TEXT", "ping")
          data = json.dumps({"text": text}).encode("utf-8")
          req = urllib.request.Request(
              url,
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  if resp.status >= 400:
                      body = resp.read()
                      raise SystemExit(f"HTTP {resp.status}: {body!r}")
          except urllib.error.HTTPError as e:
              raise SystemExit(f"HTTPError {e.code}: {e.read()!r}") from e
          PY

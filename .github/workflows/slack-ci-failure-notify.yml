# Posts a short message to Slack when CI or Semgrep fails (workflow_run).
# Requires repository secret SLACK_WEBHOOK_URL (same as Slack operator ping).
# Skips if secret unset. No checkout needed.
name: Slack CI failure notify

permissions:
  contents: read

'on':
  workflow_run:
    workflows: [CI, Semgrep, SBOM]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    # Only the upstream-conclusion check is at job level (no secrets context).
    # Webhook presence is detected at step level — placing `secrets.*` in a
    # job-level `if:` can produce a phantom failed run with 0 jobs.
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Detect Slack webhook
        id: webhook
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "SLACK_WEBHOOK_URL is unset; downstream steps will skip cleanly."
          fi

      - name: Post CI failure summary to Slack
        if: steps.webhook.outputs.present == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MENTION_USER_ID: ${{ vars.SLACK_MENTION_USER_ID }}
          RUN_HTML_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event.workflow_run.event }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          def _normalize_slack_member_id(raw_id: str) -> str:
              mid = (raw_id or "").strip()
              if not mid:
                  return ""
              if mid.startswith("<@") and mid.endswith(">"):
                  mid = mid[2:-1]
              return mid.strip()

          def with_optional_mention(text: str, raw_id: str) -> str:
              mid = _normalize_slack_member_id(raw_id)
              if not mid:
                  return text
              return f"<@{mid}>\n{text}"

          url = os.environ["SLACK_WEBHOOK_URL"]
          lines = [
              f"Data Boar — {os.environ['RUN_NAME']} falhou",
              f"Repositório: {os.environ['REPO']}",
              f"Evento: {os.environ['EVENT']}",
              f"Branch (head): {os.environ['HEAD_BRANCH']}",
              f"Workflow: {os.environ['RUN_NAME']}",
              f"Abrir run: {os.environ['RUN_HTML_URL']}",
          ]
          body = "\n".join(lines)
          text = with_optional_mention(body, os.environ.get("SLACK_MENTION_USER_ID", ""))
          data = json.dumps({"text": text}).encode("utf-8")
          req = urllib.request.Request(
              url,
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  if resp.status >= 400:
                      body = resp.read()
                      raise SystemExit(f"HTTP {resp.status}: {body!r}")
          except urllib.error.HTTPError as e:
              raise SystemExit(f"HTTPError {e.code}: {e.read()!r}") from e
          PY

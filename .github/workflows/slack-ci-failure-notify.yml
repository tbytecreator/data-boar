# Posts a short message to Slack when CI or Semgrep fails (workflow_run).
# Requires repository secret SLACK_WEBHOOK_URL (same as Slack operator ping).
# Skips if secret unset. No checkout needed.
name: Slack CI failure notify

permissions:
  contents: read

'on':
  workflow_run:
    workflows: [CI, Semgrep]
    types: [completed]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'failure' &&
        secrets.SLACK_WEBHOOK_URL != ''
      }}
    steps:
      - name: Post CI failure summary to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_HTML_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NAME: ${{ github.event.workflow_run.name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event.workflow_run.event }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          url = os.environ["SLACK_WEBHOOK_URL"]
          lines = [
              f"Data Boar — {os.environ['RUN_NAME']} falhou",
              f"Repositório: {os.environ['REPO']}",
              f"Evento: {os.environ['EVENT']}",
              f"Branch (head): {os.environ['HEAD_BRANCH']}",
              f"Workflow: {os.environ['RUN_NAME']}",
              f"Abrir run: {os.environ['RUN_HTML_URL']}",
          ]
          text = "\n".join(lines)
          data = json.dumps({"text": text}).encode("utf-8")
          req = urllib.request.Request(
              url,
              data=data,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  if resp.status >= 400:
                      body = resp.read()
                      raise SystemExit(f"HTTP {resp.status}: {body!r}")
          except urllib.error.HTTPError as e:
              raise SystemExit(f"HTTPError {e.code}: {e.read()!r}") from e
          PY

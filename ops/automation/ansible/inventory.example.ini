# --- Pick ONE [t14] target (copy to inventory.local.ini; do not commit). ---
#
# A) Playbook runs ON this machine (same shell as leitao) — use local connection:
# [t14]
# localhost ansible_connection=local
#
# B) Playbook runs from another host and reaches the T14 over SSH:
# [t14]
# t14 ansible_host=CHANGEME ansible_user=CHANGEME
#
# Placeholder (replace with A or B):
[t14]
example-host ansible_host=CHANGEME ansible_user=CHANGEME

# Optional — hosts that run deploy/lab-smoke-stack (Data Boar lab smoke). Used by
# playbooks/lab-smoke-stack-init-perms.yml (chmod init SQL after SCP).
# [lab_smoke]
# latitude ansible_host=CHANGEME ansible_user=leitao

# Optional — Debian/Ubuntu hosts where you mount CIFS/NFS/sshfs for `type: filesystem`
# or NFS mount-before-scan; used by playbooks/lab-data-boar-share-clients.yml (cifs-utils, nfs-common, sshfs, fuse3).
# [lab_share_clients]
# t14 ansible_host=CHANGEME ansible_user=CHANGEME

# Optional — set false to skip Docker CE (default in t14-baseline.yml is true).
# [t14:vars]
# t14_install_docker_ce=false
# Optional — disable Swarm (default is true: single-node manager for docker service / stack).
# t14_docker_swarm_init=false
# Optional — explicit human login for supplementary groups + Bitwarden bw verify (avoids root on localhost / sudo ansible-playbook).
# t14_operator_target_user=leitao
# Optional — lock toolchain binaries to root:comp (0754); see role t14_toolchain_restrict + collections/requirements.yml if using ACL extras.
# t14_toolchain_restrict_enabled=true
# Optional — sshd profile: dev (forwarding on) vs strict (no TCP/agent forwarding).
# t14_sshd_profile=strict
# Optional — extra users for supplementary groups (docker, wireshark, …); JSON in .ini or group_vars YAML.
# t14_operator_group_users_extra=["otheruser"]
# Legacy alias still merged by t14_operator_supplementary_groups:
# t14_docker_socket_group_users_extra=["otheruser"]

[all:vars]
ansible_python_interpreter=/usr/bin/python3

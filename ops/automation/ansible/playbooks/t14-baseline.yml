---
- name: T14 baseline (LMDE 7) - safe defaults
  hosts: t14
  become: true
  # Uses group_vars/all.yml — apt-listbugs + unattended apt (see README + tests/test_ansible_playbooks_unattended_apt.py).
  environment: "{{ labop_debian_unattended_apt_environment | combine(t14_play_apt_environment_extra | default({})) }}"
  vars:
    # Optional extra env for this play only (e.g. proxy). Merged over labop_debian_unattended_apt_environment.
    t14_play_apt_environment_extra: {}

    # Profile presets: "lab_op_fixed" (desk-bound) vs "roaming" (untrusted networks)
    # The playbook stays safe-default: do not change remote access posture unless you opt-in.
    host_profile: lab_op_fixed

    # --- Containers (defaults tuned for dev workstation + ctop; override in inventory to disable) ---
    # Docker CE (official Docker repo) + Compose plugin — so `docker`/`ctop` work without manual apt
    t14_install_docker_ce: true
    t14_docker_install_compose_plugin: true
    # Docker Swarm (single-node manager) — enables `docker service` / `docker stack deploy`
    t14_docker_swarm_init: true
    # Podman (rootless containers, OCI-compatible)
    t14_install_podman: false
    # k3s (lightweight Kubernetes — installs from get.k3s.io; opt-in deliberately)
    t14_install_k3s: false

    # --- Opt-in knobs (observability) ---
    # Install CLI tools (iotop, iftop, ctop, munin-node, monit, node_exporter) — safe default: true
    t14_obs_install_cli_tools: true
    t14_obs_install_ctop: true
    # Syslog forwarding to central server (set IP in group_vars/host_vars, never committed)
    t14_obs_syslog_forward_enabled: false
    t14_obs_syslog_server_ip: ""
    # Munin node (expose to Munin master)
    t14_obs_munin_node_enabled: true
    t14_obs_munin_allowed_ips: []
    # Monit (local process supervision)
    t14_obs_monit_enabled: true
    t14_obs_monit_web_enabled: false
    # Prometheus node_exporter
    t14_obs_node_exporter_enabled: true
    # Wazuh SIEM agent (requires manager IP; off by default until lab is ready)
    t14_obs_wazuh_agent_enabled: false
    t14_obs_wazuh_manager_ip: ""

    # Bitwarden CLI: not in Debian main. Role t14_bitwarden_cli installs npm -g @bitwarden/cli, PATH for tmux,
    # fixes docker.list perms if present, and asserts /usr/local/bin/bw exists before the play continues.
    t14_install_bitwarden_cli: true

    # --- Opt-in knobs (snapshots / btrfs) ---
    # Snapper: automatic BTRFS snapshots (skips gracefully if root is not btrfs)
    t14_snapper_enabled: true
    t14_snapper_timeline_limit_hourly: "5"
    t14_snapper_timeline_limit_daily: "7"

    # sshd LAB-OP drop-in: dev = TCP/agent forwarding on; strict = no forwarding (closer to locked laptop).
    t14_sshd_profile: dev

  roles:
    # --- System baseline ---
    - role: t14_baseline_packages
    # Bitwarden CLI early: fail fast if bw cannot be installed (rest of baseline assumes optional secret workflow).
    - role: t14_bitwarden_cli
    - role: t14_banners
    - role: t14_sshd_labop
    - role: t14_editor_defaults
    - role: t14_lynis
    - role: t14_ufw
    - role: t14_fail2ban
    - role: t14_unattended_upgrades
    - role: t14_etckeeper
    - role: t14_login_defs
    - role: t14_shell_umask
    - role: t14_limits_labop
    - role: t14_sshguard
    - role: t14_usbguard
    - role: t14_labop_sudoers
    - role: t14_snmpd_v3_only
    - role: t14_aide
    - role: t14_auditd
    - role: t14_zram
    # --- Containers (Docker CE default; Podman / k3s opt-in) ---
    - role: t14_docker_ce
    - role: t14_operator_supplementary_groups
    - role: t14_podman
    - role: t14_k3s
    # --- Observability (progressive opt-in) ---
    - role: t14_observability
    # --- Optional: restrict GCC/FPC-style toolchain binaries to root + group comp (see role defaults) ---
    - role: t14_toolchain_restrict
    # --- Snapshots (btrfs only, skips gracefully on ext4) ---
    - role: t14_snapper
      when: t14_snapper_enabled | bool

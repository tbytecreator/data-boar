---
# If Docker CE was partially configured, docker.list can be root-only and trigger Errno 13 for user-space apt readers.
- name: Stat Docker CE apt list file (if present)
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/docker.list
  register: t14_docker_list_stat
  when: t14_install_bitwarden_cli | bool

- name: Ensure docker.list is root-owned and world-readable (avoids Permission denied noise)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    owner: root
    group: root
    mode: "0644"
  when:
    - t14_install_bitwarden_cli | bool
    - t14_docker_list_stat.stat.exists | default(false)

- name: Install Node.js and npm (for Bitwarden CLI)
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present
    update_cache: true
  when: t14_install_bitwarden_cli | bool

- name: Check if bw is already on PATH
  ansible.builtin.shell: command -v bw
  register: t14_bw_cmd_v
  changed_when: false
  failed_when: false
  when: t14_install_bitwarden_cli | bool

- name: Install Bitwarden CLI globally via npm
  ansible.builtin.command:
    argv:
      - npm
      - install
      - -g
      - "{{ t14_bitwarden_cli_npm_package }}"
  when:
    - t14_install_bitwarden_cli | bool
    - t14_bw_cmd_v.rc != 0

# npm -g as root can leave /usr/local/lib/node_modules/@bitwarden only root-accessible;
# normal users then get "Permission denied" on /usr/local/bin/bw (symlink to bw.js).
- name: Ensure @bitwarden global tree is traversable by non-root
  ansible.builtin.command:
    argv:
      - chmod
      - -R
      - go+rX
      - /usr/local/lib/node_modules/@bitwarden
  changed_when: true
  failed_when: false
  when: t14_install_bitwarden_cli | bool

- name: Ensure bw.js entrypoint is executable
  ansible.builtin.file:
    path: /usr/local/lib/node_modules/@bitwarden/cli/build/bw.js
    mode: "0755"
    follow: true
  failed_when: false
  when: t14_install_bitwarden_cli | bool

- name: Ensure login shells see /usr/local/bin (bw symlink)
  ansible.builtin.copy:
    dest: /etc/profile.d/zz-local-bin.sh
    mode: "0644"
    content: |
      # Managed by Ansible (t14_bitwarden_cli) — Bitwarden CLI and other /usr/local/bin tools
      case ":${PATH}:" in
        *:/usr/local/bin:*) ;;
        *) export PATH="/usr/local/bin:${PATH}" ;;
      esac
  when: t14_install_bitwarden_cli | bool

# tmux / non-login bash often skips /etc/profile.d; interactive bash always reads bash.bashrc.
- name: Ensure interactive bash (tmux panes) prepends /usr/local/bin to PATH
  ansible.builtin.blockinfile:
    path: /etc/bash.bashrc
    marker: "# {mark} ANSIBLE MANAGED BLOCK t14_bitwarden_cli_path"
    block: |
      # Bitwarden CLI (npm -g) and other /usr/local/bin tools
      case ":${PATH}:" in
        *:/usr/local/bin:*) ;;
        *) export PATH="/usr/local/bin:${PATH}" ;;
      esac
    create: false
  when: t14_install_bitwarden_cli | bool

- name: Stat Bitwarden CLI binary (enforce install contract)
  ansible.builtin.stat:
    path: /usr/local/bin/bw
    follow: true
  register: t14_bw_bin_stat
  when: t14_install_bitwarden_cli | bool

- name: Assert Bitwarden CLI is available at /usr/local/bin/bw
  ansible.builtin.assert:
    that:
      - t14_bw_bin_stat.stat.exists | default(false)
      - t14_bw_bin_stat.stat.isreg | default(false) or t14_bw_bin_stat.stat.islnk | default(false)
    fail_msg: >-
      Expected /usr/local/bin/bw after role t14_bitwarden_cli. Install failed or PATH bootstrap missing;
      see ops/automation/ansible/README.md (Bitwarden CLI) or scripts/t14-bitwarden-cli-bootstrap.sh.
  when: t14_install_bitwarden_cli | bool

# Full path: non-root shells may not have /usr/local/bin until profile.d is sourced in a new login.
- name: Verify bw for account that runs Ansible (must work without manual chmod)
  ansible.builtin.command: /usr/local/bin/bw --version
  become: true
  become_user: "{{ _bw_verify_login }}"
  vars:
    _override: "{{ t14_operator_target_user | default('') | trim }}"
    _sudo_u: "{{ ansible_env.SUDO_USER | default('') | trim }}"
    _fallback: "{{ ansible_user | default(ansible_user_id) }}"
    _bw_verify_login: "{{ _override if (_override | length > 0) else (_sudo_u if (_sudo_u | length > 0) else _fallback) }}"
  register: t14_bw_ver
  changed_when: false
  when: t14_install_bitwarden_cli | bool

- name: Show bw version
  ansible.builtin.debug:
    msg: "{{ t14_bw_ver.stdout_lines | default([]) }}"
  when: t14_install_bitwarden_cli | bool

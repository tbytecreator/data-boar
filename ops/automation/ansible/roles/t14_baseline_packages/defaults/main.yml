---
# Baseline "operator workstation" packages. Keep conservative and common.
t14_baseline_packages:
  # Core system
  - ca-certificates
  - procps
  - curl
  - git
  - gnupg
  - openssh-client
  - openssh-server
  - wget
  - rsync
  # Security hardening
  - auditd
  - audispd-plugins
  - aide
  - debsums
  - needrestart
  - dlocate
  # Process / file inspection
  - lsof
  - strace
  - sysstat
  # Login/session evidence (wtmp/utmp DB; last(1) / observability)
  - wtmpdb
  # Hardware monitoring
  - lm-sensors
  - smartmontools
  # Terminal multiplexer (operator sessions, sudo-warm + tmux send-keys from dev PC)
  - tmux
  # GTK tiling terminal (GUI); Debian package name is tilix — not "tilyx"
  - tilix
  # Interactive process monitors
  - htop
  - btop
  - iotop
  - iftop
  - nethogs
  # Disk / filesystem
  - ncdu
  - tree
  - pydf
  # Log viewers
  - lnav
  - multitail
  # Data
  - sqlite3
  - jq
  # Process supervision
  - monit
  # Host metrics collection
  - munin-node
  - prometheus-node-exporter
  # Syslog
  - rsyslog


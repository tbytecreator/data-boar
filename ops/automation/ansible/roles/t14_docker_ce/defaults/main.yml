---
t14_install_docker_ce: false

# Docker's Debian apt repo uses Debian codenames (bookworm, trixie). LMDE reports Mint codenames
# (gigi, faye) in ansible_distribution_release — map them here. Override manually if needed.
t14_docker_apt_dist_override: ""
t14_docker_debian_codename_map:
  gigi: trixie # LMDE 7
  faye: bookworm # LMDE 6

# Install docker-compose-plugin and docker-buildx-plugin alongside docker-ce.
t14_docker_install_compose_plugin: true

# Initialize Swarm on the node (single-node manager) after install — enables `docker service` / stacks.
# Set false in inventory if you only want plain `docker run` without Swarm.
t14_docker_swarm_init: true

# Add ansible_user (inventory SSH user) + optional extras to group `docker` so `docker`/`ctop` work without sudo.
t14_docker_grant_socket_group: true
t14_docker_socket_group_users_extra: []

# Optional: daemon.json baseline (kept minimal; can be extended privately).
t14_docker_manage_daemon_json: true
t14_docker_daemon_json_path: /etc/docker/daemon.json
t14_docker_daemon_json:
  log-driver: json-file
  log-opts:
    max-size: "20m"
    max-file: "5"
  storage-driver: overlay2
  live-restore: true
  default-address-pools:
    - base: "172.30.0.0/16"
      size: 24


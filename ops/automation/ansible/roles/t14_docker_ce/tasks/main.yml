---
- name: Skip Docker CE installation unless opted-in
  when: not (t14_install_docker_ce | bool)
  ansible.builtin.debug:
    msg: "Docker CE install is disabled (t14_install_docker_ce=false)."

- name: Install Docker CE (repo-based; opt-in)
  when: t14_install_docker_ce | bool
  block:
    - name: Install Docker dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Ensure Docker keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key (Debian)
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Choose Debian suite codename for Docker apt (LMDE uses gigi/faye, not trixie/bookworm)
      ansible.builtin.set_fact:
        t14_docker_apt_dist: >-
          {{
            ((t14_docker_apt_dist_override | default('') | trim | length) > 0)
            | ternary(
                t14_docker_apt_dist_override | trim,
                t14_docker_debian_codename_map.get(
                  ansible_distribution_release | lower,
                  ansible_distribution_release,
                ),
              )
          }}

    - name: Add Docker apt repository (Debian)
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ t14_docker_apt_dist }} stable"
        filename: docker
        state: present

    - name: Install docker-ce base
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true

    - name: Install docker-compose-plugin and buildx (opt-in)
      when: t14_docker_install_compose_plugin | bool
      ansible.builtin.apt:
        name:
          - docker-compose-plugin
          - docker-buildx-plugin
        state: present

    - name: Optionally write daemon.json (minimal baseline)
      when: t14_docker_manage_daemon_json | bool
      ansible.builtin.copy:
        dest: "{{ t14_docker_daemon_json_path }}"
        owner: root
        group: root
        mode: "0644"
        content: "{{ t14_docker_daemon_json | to_nice_json }}\n"

    - name: Ensure docker is enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      failed_when: false

    - name: Grant user(s) docker group membership (API socket without sudo)
      when: t14_docker_grant_socket_group | bool
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ ([ansible_user | default(ansible_user_id)] + (t14_docker_socket_group_users_extra | default([]))) | unique }}"

    - name: Query Swarm local node state (idempotent init)
      ansible.builtin.command:
        argv:
          - docker
          - info
          - --format
          - "{{ '{{' }}.Swarm.LocalNodeState{{ '}}' }}"
      register: t14_swarm_node_state
      changed_when: false
      failed_when: false
      when: t14_docker_swarm_init | bool

    - name: Initialize Docker Swarm (single-node manager)
      ansible.builtin.command: docker swarm init
      register: t14_swarm_init
      changed_when: "'Swarm initialized' in (t14_swarm_init.stdout | default(''))"
      failed_when: false
      when:
        - t14_docker_swarm_init | bool
        - >
            (t14_swarm_node_state.stdout | default('') | trim) == 'inactive'
            or (t14_swarm_node_state.rc | default(1)) != 0


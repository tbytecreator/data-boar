---
- name: Ensure banner tools are installed
  ansible.builtin.apt:
    name:
      - figlet
      - toilet
    state: present
    update_cache: false
  failed_when: false

- name: Generate banner content (best-effort)
  ansible.builtin.shell: |
    set -euo pipefail
    echo "{{ t14_banner_plain_header }}"
    echo
    if command -v figlet >/dev/null 2>&1; then
      figlet -w 120 "{{ t14_banner_figlet_text }}"
    elif command -v toilet >/dev/null 2>&1; then
      toilet -w 120 "{{ t14_banner_figlet_text }}"
    else
      echo "{{ t14_banner_figlet_text }}"
    fi
    echo
    printf '# %s\n' "{{ t14_banner_disclaimer_lines | join('\n') }}" | sed 's/^# $/#/g'
  args:
    executable: /bin/bash
  register: t14_banner_generated
  changed_when: false

- name: Write /etc/banner.net
  ansible.builtin.copy:
    dest: "{{ t14_banner_net_path }}"
    owner: root
    group: root
    mode: "0644"
    content: "{{ t14_banner_generated.stdout }}\n"

- name: Write /etc/issue
  ansible.builtin.copy:
    dest: "{{ t14_banner_issue_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      {{ t14_banner_plain_header }}

- name: Write /etc/issue.net
  ansible.builtin.copy:
    dest: "{{ t14_banner_issue_net_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      {{ t14_banner_plain_header }}

- name: Optionally configure SSHD Banner
  when: t14_banner_enable_sshd_banner | bool
  block:
    - name: Ensure sshd_config uses banner.net
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^\s*Banner\s+'
        line: "Banner {{ t14_banner_net_path }}"
        create: false
      notify: Restart ssh


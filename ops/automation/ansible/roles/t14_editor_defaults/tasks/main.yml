---
- name: Ensure editor packages are installed (opt-in)
  when: t14_editor_enable | bool and t14_editor_install | bool
  ansible.builtin.apt:
    name: "{{ t14_editor_packages }}"
    state: present
    update_cache: false
  failed_when: false

- name: Set /usr/bin/editor alternative (best-effort, non-interactive)
  when: t14_editor_enable | bool
  ansible.builtin.command: "update-alternatives --set editor {{ t14_editor_alternative_path }}"
  changed_when: true
  failed_when: false


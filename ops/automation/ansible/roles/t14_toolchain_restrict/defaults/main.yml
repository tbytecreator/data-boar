---
# Restrict selected /usr/bin/x86_64-linux-gnu-* toolchain binaries to root + a dedicated group (default: comp).
# Opt-in: t14_toolchain_restrict_enabled=false by default (safe for generic workstations).
#
# Package upgrades (apt) can restore vendor permissions — re-run this playbook or a post-upgrade hook.
t14_toolchain_restrict_enabled: false

t14_toolchain_owner: root
t14_toolchain_group: comp
# Match your manual model: owner rwx, group r-x, others r-- (no execute for "other").
t14_toolchain_file_mode: "0754"

t14_toolchain_bin_dir: /usr/bin

# Basenames matched under t14_toolchain_bin_dir (fnmatch). Versioned GCC/FPC families.
t14_toolchain_glob_patterns:
  - x86_64-linux-gnu-cpp-1*
  - x86_64-linux-gnu-g++-1*
  - x86_64-linux-gnu-gcc-1*
  - x86_64-linux-gnu-gcc-ar-1*
  - x86_64-linux-gnu-gcc-nm-1*
  - x86_64-linux-gnu-gcc-ranlib-1*
  - x86_64-linux-gnu-gcov-1*
  - x86_64-linux-gnu-gfortran-1*
  - x86_64-linux-gnu-fpc*

# Exact names (no glob) — only regular files that exist are touched.
t14_toolchain_exact_basenames:
  - x86_64-linux-gnu-as
  - x86_64-linux-gnu-ar
  - x86_64-linux-gnu-c++filt
  - x86_64-linux-gnu-elfedit
  - x86_64-linux-gnu-cpp

# Optional: extra POSIX ACL group entries (rx) without changing primary group ownership.
# Requires collection ansible.posix and package `acl` on the host (role installs `acl` when non-empty).
# Example: t14_toolchain_acl_extra_groups: [ "backup" ]
t14_toolchain_acl_extra_groups: []

---
# Snapper — BTRFS snapshot automation for T14 lab node.
# IMPORTANT: snapper only works on btrfs subvolumes.
# This role skips gracefully if the filesystem is not btrfs.

# Enable/disable the role entirely.
t14_snapper_enabled: true

# Subvolume to protect (default: root — requires root on btrfs).
t14_snapper_config_name: "root"
t14_snapper_subvolume: "/"
# create-config autodetection uses setmntent(3) and can fail under Ansible ("setmntent failed").
# Forcing btrfs avoids that path on btrfs roots.
t14_snapper_create_config_fstype: "btrfs"

# Snapshot schedule (systemd timer — snapper ships timeline timers).
t14_snapper_timeline_create: true
t14_snapper_timeline_cleanup: true

# How many snapshots to keep in each category.
t14_snapper_timeline_limit_hourly:  "5"
t14_snapper_timeline_limit_daily:   "7"
t14_snapper_timeline_limit_weekly:  "2"
t14_snapper_timeline_limit_monthly: "2"
t14_snapper_timeline_limit_yearly:  "1"
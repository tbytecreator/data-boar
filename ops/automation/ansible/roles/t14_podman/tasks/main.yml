---
- name: Skip Podman installation unless opted-in
  when: not (t14_install_podman | bool)
  ansible.builtin.debug:
    msg: "Podman install is disabled (t14_install_podman=false)."

- name: Install Podman (rootless containers)
  when: t14_install_podman | bool
  block:
    - name: Assert supported OS for t14_podman automation
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian" or ansible_distribution == "Void"
        fail_msg: >-
          t14_podman supports Debian family (apt) or Void Linux (xbps).
          This host: ansible_os_family={{ ansible_os_family | default('unknown') }},
          ansible_distribution={{ ansible_distribution | default('unknown') }}.

    - name: Install podman and OCI tooling (Debian apt)
      when: ansible_os_family == "Debian"
      ansible.builtin.apt:
        name:
          - podman
          - buildah
          - skopeo
        state: present
        update_cache: true

    - name: Install podman and OCI tooling (Void xbps, check mode dry-run)
      when:
        - ansible_distribution == "Void"
        - ansible_check_mode
      ansible.builtin.command:
        argv: "{{ ['xbps-install', '-Syn'] + t14_podman_void_packages }}"
      register: t14_void_podman_check
      changed_when: >-
        (t14_void_podman_check.stdout | default(''))
        | regex_search('(?i)[1-9][0-9]*\\s+packages?\\s+will\\s+be\\s+installed')
        is not none
      failed_when: t14_void_podman_check.rc != 0

    - name: Install podman and OCI tooling (Void xbps, apply)
      when:
        - ansible_distribution == "Void"
        - not ansible_check_mode
      ansible.builtin.command:
        argv: "{{ ['xbps-install', '-Sy'] + t14_podman_void_packages }}"
      register: t14_void_podman_apply
      changed_when: >-
        (t14_void_podman_apply.stdout | default(''))
        | regex_search('(?i)[1-9][0-9]*\\s+packages?\\s+will\\s+be\\s+installed')
        is not none
      failed_when: t14_void_podman_apply.rc != 0

    - name: Install rootless dependencies (uidmap, slirp4netns, fuse-overlayfs) (Debian apt)
      when: ansible_os_family == "Debian"
      ansible.builtin.apt:
        name: "{{ t14_podman_rootless_packages }}"
        state: present

    - name: Install podman-compose (Debian apt)
      when:
        - ansible_os_family == "Debian"
        - t14_podman_install_compose | bool
      ansible.builtin.apt:
        name: podman-compose
        state: present

    - name: Install podman-compose (Void xbps, check mode dry-run)
      when:
        - ansible_distribution == "Void"
        - t14_podman_install_compose | bool
        - ansible_check_mode
      ansible.builtin.command:
        argv: [xbps-install, -Syn, podman-compose]
      register: t14_void_compose_check
      changed_when: >-
        (t14_void_compose_check.stdout | default(''))
        | regex_search('(?i)[1-9][0-9]*\\s+packages?\\s+will\\s+be\\s+installed')
        is not none
      failed_when: t14_void_compose_check.rc != 0

    - name: Install podman-compose (Void xbps, apply)
      when:
        - ansible_distribution == "Void"
        - t14_podman_install_compose | bool
        - not ansible_check_mode
      ansible.builtin.command:
        argv: [xbps-install, -Sy, podman-compose]
      register: t14_void_compose_apply
      changed_when: >-
        (t14_void_compose_apply.stdout | default(''))
        | regex_search('(?i)[1-9][0-9]*\\s+packages?\\s+will\\s+be\\s+installed')
        is not none
      failed_when: t14_void_compose_apply.rc != 0

    # loginctl enable-linger must target the human login, not root (become) nor a stale ansible_user_id.
    - name: Resolve login for podman rootless linger
      ansible.builtin.set_fact:
        t14_podman_linger_login: "{{ _pl }}"
      vars:
        _override: "{{ t14_operator_target_user | default('') | trim }}"
        _sudo_u: "{{ ansible_facts.get('ansible_env', {}).get('SUDO_USER', '') | trim }}"
        _fallback: "{{ ansible_user | default(ansible_user_id) }}"
        _pl: "{{ _override if (_override | length > 0) else (_sudo_u if (_sudo_u | length > 0) else _fallback) }}"

    - name: Hint when linger would target root (wrong for rootless podman)
      ansible.builtin.debug:
        msg: >-
          Podman linger skipped: resolved login is root. Set t14_operator_target_user in inventory
          (e.g. leitao) or run ansible-playbook as your normal user with --ask-become-pass
          (avoid `sudo ansible-playbook` without that override).
      when: t14_podman_linger_login == 'root'

    - name: Enable lingering for operator user (rootless containers survive logout)
      when:
        - t14_podman_linger_login != 'root'
        - not ansible_check_mode
      ansible.builtin.command: loginctl enable-linger "{{ t14_podman_linger_login }}"
      changed_when: false

    - name: Verify podman binary (post-install)
      when: not ansible_check_mode
      ansible.builtin.command: podman --version
      register: t14_podman_version_cmd
      changed_when: false

    - name: Report podman version
      when: not ansible_check_mode
      ansible.builtin.debug:
        msg: "{{ t14_podman_version_cmd.stdout | default('') }}"

    - name: Write docker alias to profile.d (optional)
      when: t14_podman_docker_alias | bool
      ansible.builtin.copy:
        dest: /etc/profile.d/podman-docker-alias.sh
        content: |
          # Podman as docker drop-in (opt-in; edge cases exist)
          if command -v podman &>/dev/null && ! command -v docker &>/dev/null; then
            alias docker=podman
          fi
        owner: root
        group: root
        mode: "0644"

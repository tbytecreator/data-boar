---
# Add operator login (+ extras) to standard supplementary groups for workstation/lab operation.
# t14_operator_target_user: see ../../group_vars/all.yml
t14_operator_groups_enabled: true

# tshark pulls wireshark-common — creates group `wireshark` so capture works without root (with group membership + re-login).
t14_operator_install_tshark: true

# Always applied when enabled (docker / wireshark are added in tasks when Docker CE / tshark are enabled).
t14_operator_supplementary_group_names:
  - dialout
  - plugdev
  - systemd-journal

# Extra group names (kvm, libvirt, …) — only if those groups already exist on the host (install qemu/libvirt first).
t14_operator_supplementary_group_names_extra: []

# Extra usernames besides the resolved operator login.
t14_operator_group_users_extra: []

# After group membership changes: sync gshadow and verify (shadow-utils).
t14_operator_run_grpconv_grpck: true
# If grpck reports pre-existing issues on the host, set false to warn only (not recommended).
t14_operator_grpck_strict: true

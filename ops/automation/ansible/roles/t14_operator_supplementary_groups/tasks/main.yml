---
- name: Skip operator supplementary groups
  when: not (t14_operator_groups_enabled | bool)
  ansible.builtin.debug:
    msg: "Operator supplementary groups disabled (t14_operator_groups_enabled=false)."

- name: Apply operator supplementary groups
  when: t14_operator_groups_enabled | bool
  block:
    - name: Install tshark (Wireshark CLI; enables wireshark group for non-root capture)
      when: t14_operator_install_tshark | bool
      ansible.builtin.apt:
        name: tshark
        state: present
        update_cache: true

    - name: Build effective supplementary group list
      ansible.builtin.set_fact:
        t14_operator_groups_effective: "{{ ((['docker'] if (t14_install_docker_ce | default(false) | bool) else []) + (['wireshark'] if (t14_operator_install_tshark | default(true) | bool) else []) + (t14_operator_supplementary_group_names | default([])) + (t14_operator_supplementary_group_names_extra | default([]))) | unique | list }}"

    - name: Resolve login for supplementary groups (not root when playbook runs under sudo)
      ansible.builtin.set_fact:
        t14_operator_effective_login: "{{ _op_login }}"
      vars:
        _override: "{{ t14_operator_target_user | default('') | trim }}"
        _sudo_u: "{{ ansible_env.SUDO_USER | default('') | trim }}"
        _fallback: "{{ ansible_user | default(ansible_user_id) }}"
        _op_login: "{{ _override if (_override | length > 0) else (_sudo_u if (_sudo_u | length > 0) else _fallback) }}"

    - name: Hint when groups would target root (usually wrong for docker/wireshark)
      ansible.builtin.debug:
        msg: >-
          t14_operator_effective_login is root — set t14_operator_target_user in inventory
          (e.g. leitao) or run ansible-playbook as your normal user with --ask-become-pass
          (do not use sudo ansible-playbook unless you set the override).
      when: t14_operator_effective_login == 'root'

    - name: Add operator user(s) to supplementary groups
      ansible.builtin.user:
        name: "{{ item }}"
        groups: "{{ t14_operator_groups_effective }}"
        append: true
      loop: >-
        {{
          (
            [t14_operator_effective_login]
            + (t14_operator_group_users_extra | default([]))
            + (t14_docker_socket_group_users_extra | default([]))
          ) | unique | list
        }}

    - name: Synchronize /etc/gshadow with /etc/group (grpconv)
      when: t14_operator_run_grpconv_grpck | bool
      ansible.builtin.command: grpconv
      changed_when: false

    - name: Verify group database integrity (grpck -r)
      when: t14_operator_run_grpconv_grpck | bool
      ansible.builtin.command: grpck -r
      changed_when: false
      register: t14_grpck
      failed_when: (t14_operator_grpck_strict | bool) and ((t14_grpck.rc | default(0)) != 0)

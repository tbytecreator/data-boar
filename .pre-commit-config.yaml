# Pre-commit hooks: run before each commit to catch issues early.
# Install (once per clone): uv sync && uv run pre-commit install
# Run manually / CI parity: uv run pre-commit run --all-files
# Hooks mirror .github/workflows/ci.yml lint job (Ruff, markdown, pt-BR, commercial guard, external-docs plan links, plans-stats, dependency artifacts vs uv).
# The CI test job also runs scripts/pii_history_guard.py --full-history (ADR 0020); pre-commit runs the incremental guard only.
# See https://pre-commit.com and docs/QUALITY_WORKFLOW_RECOMMENDATIONS.md

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
        # Ruff config (extend-exclude, etc.) is in pyproject.toml; same as CI.
      - id: ruff-format
        args: [--check]
        # Enforce format on commit; fix with: uv run ruff format .
  - repo: local
    hooks:
      - id: plans-stats-check
        name: plans status dashboard is fresh
        entry: python scripts/plans-stats.py --check
        language: system
        pass_filenames: false
      - id: markdown-lint-guard
        name: markdown lint guard (pytest)
        entry: uv run pytest tests/test_markdown_lint.py::test_markdown_lint_no_violations -q -W error
        language: system
        pass_filenames: false
      - id: pt-br-locale-guard
        name: pt-BR locale guard (pytest)
        entry: uv run pytest tests/test_docs_pt_br_locale.py -q -W error
        language: system
        pass_filenames: false
      - id: confidential-commercial-guard
        name: confidential commercial guard (git index)
        entry: uv run pytest tests/test_confidential_commercial_guard.py -q -W error
        language: system
        pass_filenames: false
      - id: docs-external-no-plan-links
        name: external-tier docs must not link into docs/plans
        entry: uv run pytest tests/test_docs_external_no_plan_links.py -q -W error
        language: system
        pass_filenames: false
      - id: dependency-artifacts-sync
        name: uv.lock and requirements.txt match pyproject (uv)
        entry: uv run pytest tests/test_dependency_artifacts_sync.py -q -W error
        language: system
        pass_filenames: false
      - id: pii-guard
        name: PII guard (tracked files must not contain sensitive patterns)
        entry: uv run pytest tests/test_pii_guard.py -q -W error
        language: system
        pass_filenames: false
      - id: pii-history-guard
        name: PII history guard (forbidden literals must stay purged)
        entry: uv run python scripts/pii_history_guard.py
        language: system
        pass_filenames: false

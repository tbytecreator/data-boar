# Pre-commit hooks: run before each commit to catch issues early.
# Install (once per clone): uv sync && uv run pre-commit install
# Run manually / CI parity: uv run pre-commit run --all-files
# Hooks mirror .github/workflows/ci.yml lint job (Ruff, markdown, pt-BR, commercial guard, plans-stats).
# See https://pre-commit.com and docs/QUALITY_WORKFLOW_RECOMMENDATIONS.md

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix]
        # Ruff config (extend-exclude, etc.) is in pyproject.toml; same as CI.
      - id: ruff-format
        args: [--check]
        # Enforce format on commit; fix with: uv run ruff format .
  - repo: local
    hooks:
      - id: plans-stats-check
        name: plans status dashboard is fresh
        entry: python scripts/plans-stats.py --check
        language: system
        pass_filenames: false
      - id: markdown-lint-guard
        name: markdown lint guard (pytest)
        entry: uv run pytest tests/test_markdown_lint.py::test_markdown_lint_no_violations -q -W error
        language: system
        pass_filenames: false
      - id: pt-br-locale-guard
        name: pt-BR locale guard (pytest)
        entry: uv run pytest tests/test_docs_pt_br_locale.py -q -W error
        language: system
        pass_filenames: false
      - id: confidential-commercial-guard
        name: confidential commercial guard (git index)
        entry: uv run pytest tests/test_confidential_commercial_guard.py -q -W error
        language: system
        pass_filenames: false

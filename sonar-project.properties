# SonarQube / SonarCloud analysis configuration.
# Used by:
#   - CI: .github/workflows/ci.yml (runs SonarScanner on push/PR; no Cursor/IDE on runners).
#   - Local: SonarQube extension in Cursor/VS Code (run analysis from the editor; same config).
# Add SONAR_TOKEN to repo secrets for CI. For the extension, use the IDE’s SonarQube connection (URL + token).
#
# SonarCloud: create a project at https://sonarcloud.io and set sonar.organization
# (e.g. via env in the workflow or here). Project key must match the one in SonarCloud.
# SonarQube Server: set SONAR_HOST_URL and SONAR_TOKEN in the workflow.

sonar.projectKey=python3-lgpd-crawler
# SonarCloud only: set in workflow env or here, e.g. sonar.organization=your-org
# sonar.organization=

sonar.sources=api,config,connectors,core,database,file_scan,report,scanners,utils,logging_custom,main.py
sonar.tests=tests
# Single Python version for Sonar's analyzer (not a runtime pin). CI tests 3.12+3.13; Docker image is 3.13 — TECH_GUIDE + PYTHON_UPGRADE_PLAYBOOK.
sonar.python.version=3.12

# Exclude virtual envs, caches, and non-source
sonar.exclusions=\
  **/.venv/**,\
  **/venv/**,\
  **/.git/**,\
  **/__pycache__/**,\
  **/node_modules/**,\
  **/.cursor/**,\
  **/build/**,\
  **/dist/**,\
  **/*.egg-info/**,\
  **/db/databasse.py

# Test exclusions (e.g. generated or fixtures)
sonar.test.exclusions=\
  **/__pycache__/**

# Optional: coverage exclusions (if you add coverage later)
# sonar.coverage.exclusions=**/tests/**,**/main.py

# Encoding
sonar.sourceEncoding=UTF-8

# U.S. FCPA + internal anti-corruption policy pack — sample compliance profile (lexicon / inventory)
#
# NOT LEGAL ADVICE. This file supplies technical lexicon (regex + ML terms) and report
# recommendation_overrides for teams scoping U.S. Foreign Corrupt Practices Act (FCPA)
# programmes and employer-specific internal policies (sometimes abbreviated FPCA or similar).
#
# Data Boar does NOT detect bribes, conclude FCPA violations, or replace anti-corruption
# monitoring systems. Replace or extend employer-specific acronyms and wording with counsel
# after review of your corporate policy and facts.
#
# References (public law text — not endorsement): 15 U.S.C. §§ 78dd-1 et seq. (anti-bribery);
# books-and-records and internal accounting controls provisions — verify current statute with counsel.
#
# How to use:
#   regex_overrides_file: path/to/compliance-sample-us_fcpa_internal_policy_pack.yaml
#   ml_patterns_file: path/to/compliance-sample-us_fcpa_internal_policy_pack.yaml
# Merge recommendation_overrides into report.recommendation_overrides.

regex:
  - name: "FCPA_ACRONYM"
    pattern: "(?i)\\bFCPA\\b"
    norm_tag: "US FCPA-adjacent (policy lexicon)"
  - name: "FOREIGN_CORRUPT_PRACTICES_ACT"
    pattern: "(?i)Foreign\\s+Corrupt\\s+Practices\\s+Act"
    norm_tag: "US FCPA-adjacent (policy lexicon)"
  - name: "FACILITATION_PAYMENT"
    pattern: "(?i)\\bfacilitation\\s+payment(s)?\\b"
    norm_tag: "US FCPA-adjacent (policy lexicon)"
  - name: "THIRD_PARTY_DUE_DILIGENCE"
    pattern: "(?i)third[-\\s]party\\s+due\\s+diligence"
    norm_tag: "US FCPA-adjacent (policy lexicon)"
  - name: "GIFT_AND_ENTERTAINMENT"
    pattern: "(?i)gift(s)?\\s+and\\s+entertainment"
    norm_tag: "US FCPA-adjacent (policy lexicon)"
  - name: "ANTI_BRIBERY_POLICY"
    pattern: "(?i)anti[-\\s]?bribery\\s+polic(y|ies)"
    norm_tag: "US FCPA-adjacent (policy lexicon)"
  - name: "BOOKS_AND_RECORDS_IC"
    pattern: "(?i)books\\s+and\\s+records.*internal\\s+accounting\\s+controls"
    norm_tag: "US FCPA-adjacent (policy lexicon)"
  - name: "POLITICA_ANTICORRUPCAO_PT"
    pattern: "(?i)pol[ií]tica\\s+anticorrup[cç][aã]o"
    norm_tag: "US FCPA-adjacent (policy lexicon)"
  - name: "INTERMEDIARIO_SUBORNO_PT"
    pattern: "(?i)intermedi[aá]rio.*(suborno|corrup[cç][aã]o)"
    norm_tag: "US FCPA-adjacent (policy lexicon)"


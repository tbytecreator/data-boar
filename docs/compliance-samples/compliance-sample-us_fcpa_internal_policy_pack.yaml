recommendation_overrides:
  - norm_tag_pattern: "US FCPA-adjacent (policy lexicon)"
    base_legal: "U.S. FCPA / employer anti-corruption policy — technical inventory only; not a violation determination (verify wording with counsel)."
    risk: "Match may indicate policy, training, due-diligence, or control artefacts in the data soup; requires compliance/legal review. Tool does not assess FCPA liability."
    recommendation: "Prioritise human review with compliance and counsel: map retention and access for anti-corruption records; align internal policy labels (e.g. FPCA) and statutory references with approved corporate wording; use findings as evidence inputs only."
    priority: "ALTA"
    relevant_for: "Compliance, legal, DPO (governance evidence), internal audit"

# LGPD – sample compliance profile (Brazil; Lei Geral de Proteção de Dados)
#
# Target audience: Brazilian deployments and LGPD compliance. This sample includes
# the same regex and ML terms as the app's built-in defaults (so using this file
# as regex_overrides_file and ml_patterns_file does not reduce coverage), plus
# extra Brazilian regex (RG, CEP, PIS/PASEP) and bilingual (PT-BR + EN) terms.
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-lgpd.yaml
#        ml_patterns_file: path/to/compliance-sample-lgpd.yaml
#   2. Merge the recommendation_overrides list below into report.recommendation_overrides.
#
# Regex: built-in LGPD-relevant patterns (CPF, CNPJ, phone, email, card, date) are
# included explicitly so the sample matches the detector; RG, CEP and PIS/PASEP add
# high-confidence Brazilian identifiers so we don't rely only on ML/DL in hybrid mode.
# Use double-quoted YAML with escaped backslashes for regex (see .cursor/rules/yaml-regex-patterns.mdc).

regex:
  # Built-in patterns (same as core/detector.py DEFAULT_PATTERNS) – LGPD-relevant
  - name: "LGPD_CPF"
    pattern: "\\b\\d{3}\\.?\\d{3}\\.?\\d{3}-?\\d{2}\\b"
    norm_tag: "LGPD Art. 5"
  - name: "LGPD_CNPJ"
    pattern: "\\b\\d{2}\\.?\\d{3}\\.?\\d{3}/?\\d{4}-?\\d{2}\\b"
    norm_tag: "LGPD Art. 5"
  - name: "LGPD_CNPJ_ALNUM"
    pattern: "\\b[A-Z0-9]{2}\\.?[A-Z0-9]{3}\\.?[A-Z0-9]{3}/?[A-Z0-9]{4}-?\\d{2}\\b"
    norm_tag: "LGPD Art. 5"
  - name: "PHONE_BR"
    pattern: "\\b(?:\\+55\\s?)?(?:\\(?\\d{2}\\)?\\s?)?\\d{4,5}-?\\d{4}\\b"
    norm_tag: "LGPD Art. 5"
  - name: "EMAIL"
    pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b"
    norm_tag: "LGPD Art. 5"
  - name: "CREDIT_CARD"
    pattern: "\\b\\d{4}[-\\s]?\\d{4}[-\\s]?\\d{4}[-\\s]?\\d{4}\\b"
    norm_tag: "LGPD Art. 5"
  - name: "DATE_DMY"
    pattern: "\\b\\d{1,2}/\\d{1,2}/\\d{2,4}\\b"
    norm_tag: "LGPD Art. 5"
  # Brazilian identifiers (high-confidence regex in addition to built-in)
  - name: "RG_BR"
    pattern: "\\b\\d{1,2}\\.?\\d{3}\\.?\\d{3}-?[0-9Xx]\\b"
    norm_tag: "LGPD Art. 5"
  # CEP: same 8-digit shape as many SKUs/internal IDs — review noisy sources; see SENSITIVITY_DETECTION.md (CEP precision).
  - name: "CEP_BR"
    pattern: "\\b\\d{5}-?\\d{3}\\b"
    norm_tag: "LGPD Art. 5"
  - name: "PIS_PASEP_BR"
    pattern: "\\b\\d{3}\\.?\\d{5}\\.?\\d{2}-?\\d\\b"
    norm_tag: "LGPD Art. 5"


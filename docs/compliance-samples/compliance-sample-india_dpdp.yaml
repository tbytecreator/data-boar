# India DPDP – sample compliance profile (Digital Personal Data Protection Act 2023, DPBI)
#
# Target audience: India deployments. Data Protection Board of India (DPBI); data fiduciary.
# Terms: personal data, data fiduciary (EN).
#
# How to use:
#   1. Set in your main config:
#        regex_overrides_file: path/to/compliance-sample-india_dpdp.yaml
#        ml_patterns_file: path/to/compliance-sample-india_dpdp.yaml
#   2. Merge the recommendation_overrides list below into your config under report.recommendation_overrides.
#
# India: DPDP Act 2023; DPBI; consent and lawful use.

regex:
  - name: "AADHAAR_IN"
    pattern: "\\b\\d{4}\\s?\\d{4}\\s?\\d{4}\\b"
    norm_tag: "India DPDP"
  - name: "PAN_IN"
    pattern: "\\b[A-Z]{5}\\d{4}[A-Z]\\b"
    norm_tag: "India DPDP"

# ML terms: personal data, data fiduciary, DPBI, consent manager.
terms:
  - text: "personal data"
    label: sensitive
  - text: "data fiduciary"
    label: sensitive
  - text: "data principal"
    label: sensitive
  - text: "dpbi"
    label: sensitive
  - text: "data protection board of india"
    label: sensitive
  - text: "dpdp act"
    label: sensitive
  - text: "digital personal data protection"
    label: sensitive
  - text: "consent"
    label: sensitive
  - text: "consent manager"
    label: sensitive
  - text: "lawful purpose"
    label: sensitive
  - text: "aadhaar"
    label: sensitive
  - text: "pan number"
    label: sensitive
  - text: "sensitive personal data"
    label: sensitive

recommendation_overrides:
  - norm_tag_pattern: "India DPDP"
    base_legal: "Digital Personal Data Protection Act 2023; Data Protection Board of India (DPBI)"
    risk: "Personal data and sensitive personal data; data fiduciary obligations; Aadhaar/PAN handling."
    recommendation: "Comply with DPDP Act 2023; register with DPBI if required; implement consent and lawful purpose; follow Aadhaar/PAN rules."
    priority: "ALTA"
    relevant_for: "DPO, Data Fiduciary, DPBI"

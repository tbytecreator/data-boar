# Example: scan operator home on the same Linux host (synthetic / operational text only).
# Copy beside config.lab-fs-varlog.example.yaml; adjust path if username differs.

targets:
  - name: FS_home_leitao_local
    type: filesystem
    path: /home/leitao
    recursive: true

file_scan:
  extensions: [.txt, .csv, .md, .yaml, .yml, .log, .json]
  recursive: true
  scan_compressed: false
  sample_limit: 5
  file_sample_max_chars: 8000

report:
  output_dir: ./reports/lab_fs_home

sqlite_path: ./reports/lab_fs_home/audit_fs_home.db

scan:
  max_workers: 1

rate_limit:
  max_concurrent_scans: 1
  min_interval_seconds: 2

# Example ML/DL training terms for sensitivity detection.
# Use as ml_patterns_file and/or dl_patterns_file in your config, or copy entries
# into sensitivity_detection.ml_terms / sensitivity_detection.dl_terms (inline).
# Label: sensitive (or 1) = PII/personal; non_sensitive (or 0) = not sensitive.
# See sensitivity-detection.md for full documentation.

- text: "cpf"
  label: sensitive
- text: "cnpj"
  label: sensitive
- text: "email"
  label: sensitive
- text: "telefone"
  label: sensitive
- text: "data de nascimento"
  label: sensitive
- text: "nome completo"
  label: sensitive
- text: "senha"
  label: sensitive
- text: "password"
  label: sensitive
- text: "salário"
  label: sensitive
- text: "salary"
  label: sensitive
- text: "health record"
  label: sensitive
- text: "saude"
  label: sensitive
- text: "item_count"
  label: non_sensitive
- text: "config_file"
  label: non_sensitive
- text: "temp_data"
  label: non_sensitive
- text: "system_log"
  label: non_sensitive
- text: "lyrics"
  label: non_sensitive
- text: "tablature"
  label: non_sensitive
